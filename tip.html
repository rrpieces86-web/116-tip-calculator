<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>age calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <main class="card border border-primary d-flex justify-content-center mt-5 mx-auto p-2" style="width: 400px;">
        <section class="container">
            <div class="mx-auto p-2" style="width: 200px;">
                <h1>Tip Calculator</h1>
            </div>
            <div>
                <form id="tip-form" class="mx-auto p-2" style="width: 200px;" action="">
                    <div class="mb-3">
                        <label class="form-label" for="usertotal">your total</label>
                        <input id="usertotal" class="form-control" type="text" inputmode="decimal">
                    </div>
                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </div>
             <div id="results-container" class="mt-3" style="display:none;">
                <hr>
                <div id="results-row" class="d-flex flex-row justify-content-between flex-wrap">
                    <!-- Cards injected by JS -->
                </div>
            </div>
 
            <div id="error-msg" class="text-danger text-center mt-2" style="display:none;">
                Please enter a valid amount.
            </div>
        </section>
        
    </main>
    
</body>
<script src="./tip.js"></script>
</html>
